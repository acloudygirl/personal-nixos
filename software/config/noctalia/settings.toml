config_version = 1

[bar]
order = [ "top", "left" ]

    [bar.left]
    thickness = 48
    capsule = true
    capsule_fill = "surface_variant"
    capsule_opacity = 0.9
    capsule_radius = 8.0

    [bar.top]
    center = [ "clock", "weather" ]
    end = [ "audio-visualizer", "tray", "notifications", "battery", "volume", "brightness", "control-center", "session" ]
    font_family = "Noto Sans"
    margin_ends = 5
    capsule = true
    capsule_fill = "surface_variant"
    capsule_opacity = 0.9
    capsule_radius = 8.0

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 1024.0
    cy = 1161.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[shell.panel]
session_placement = "floating"
session_position = "center"

[shell.session]
grid = true

[theme]
mode = "auto"

    [theme.templates]
    builtin_ids = [ "kitty", "niri", "qt" ]
    community_ids = [ "vscode", "zed", "papirus-icons", "telegram" ]

[wallpaper]
directory = "/home/cloudygirl/Pictures/WallPapers"

    [wallpaper.default]
    path = "/home/cloudygirl/Pictures/WallPapers/card_1135_trained.png"

    [wallpaper.last]
    path = "/home/cloudygirl/Pictures/WallPapers/card_1135_trained.png"

    [wallpaper.monitors.eDP-1]
    path = "/home/cloudygirl/Pictures/WallPapers/card_1135_trained.png"

[widget.control-center]
capsule = true

[widget.taskbar]
type = "taskbar"
group_by_workspace = true
show_all_outputs = false
show_workspace_label = true
workspace_label_placement = "corner"
hide_empty_workspaces = true
workspace_group_capsule = true
group_single_icon_per_app = true
show_active_indicator = true
active_opacity = 1.0
inactive_opacity = 0.8
capsule_radius = 8.0

[widget.launcher]
glyph = "rocket"
capsule = true

[widget.workspaces]
display = "id"
labels_only_when_occupied = true

[widget.clock]
capsule = true

[widget.tray]
drawer = true
drawer_columns = 3
capsule = true

[widget.notifications]
hide_when_no_unread = true
capsule = true

[widget.battery]
display_mode = "graphic"
show_label = false
capsule = true

[widget.volume]
show_label = false
capsule = true

[widget.brightness]
show_label = false
capsule = true

[widget.audio-visualizer]
type = "audio_visualizer"
width = 64
bands = 16
centered = true
show_when_idle = false
color_1 = "primary"
color_2 = "secondary"
capsule = false

[widget.media]
hide_when_no_media = true
capsule = true

[widget.active_window]
capsule = true
